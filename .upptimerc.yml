  # .upptimerc.yml — Upptime configuration                                            
                                                                  
  owner: quickcourseai                                                                
  repo: status                                                                        
  user-agent: quickcourseai

  sites:
    - name: AI Tools Lister
      url: https://aitoolslister.com/healthz
      icon: https://aitoolslister.com/favicon.ico
      maxResponseTime: 5000

    # - name: ResumeGuru
    #   url: https://airesume.guru
    #   maxResponseTime: 5000

    - name: Support (Chatwoot)
      url: https://support.aitoolslister.com
      expectedStatusCodes:
        - 200
        - 301
        - 302
      maxResponseTime: 10000

    - name: Mattermost
      url: https://mattermost.aitoolslister.com/api/v4/system/ping
      maxResponseTime: 5000

    - name: Umami Analytics
      url: https://umami.aitoolslister.com
      expectedStatusCodes:
        - 200
        - 301
        - 302
      maxResponseTime: 5000

  status-website:
    cname: status.aitoolslister.com
    name: AI Tools Lister Status
    theme: dark
    introTitle: "**AI Tools Lister** Service Status"
    introMessage: "Real-time monitoring of all services. Powered by
  [Upptime](https://github.com/upptime/upptime)."
    navbar:
      - title: Status
        href: /
      - title: AI Tools Lister
        href: https://aitoolslister.com

  workflowSchedule:
    uptime: "*/5 * * * *"
    graphs: "0 0 * * *"
    responseTime: "0 23 * * *"
    staticSite: "0 1 * * *"
    summary: "0 0 * * *"
